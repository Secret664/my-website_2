<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>時間帯トレード 完全パターン参照ガイド</title>
<style>
  :root {
    --color-text-primary: #1a1a18;

    --color-text-success: #085041;
    --color-text-warning: #633806;
    --color-text-danger: #791f1f;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f1efe8;
    --color-background-info: #e6f1fb;
    --color-background-success: #e1f5ee;
    --color-background-warning: #faeeda;
    --color-background-danger: #fcebeb;
    --color-border-tertiary: rgba(0,0,0,0.12);
    --color-border-secondary: rgba(0,0,0,0.25);

    --border-radius-md: 8px;

  @media (prefers-color-scheme: dark) {
    :root {
      --color-text-primary: #e8e6df;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;
      --color-text-info: #85b7eb;
      --color-text-success: #5dcaa5;
      --color-text-warning: #fac775;
      --color-text-danger: #f09595;
      --color-background-primary: #1e1e1c;
      --color-background-secondary: #2c2c2a;
      --color-background-info: #042c53;
      --color-background-success: #04342c;
      --color-background-warning: #412402;
      --color-background-danger: #501313;

  .subtitle { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.2rem; }

  .nav-btn {

    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    background: transparent;
    color: var(--color-text-secondary);
    cursor: pointer; transition: all .15s;
    font-family: var(--font-sans);
  }
  .nav-btn:hover { background: var(--color-background-secondary); }
  .nav-btn.active {
    background: var(--color-background-info);
    border-color: var(--color-border-info);
    color: var(--color-text-info);
    font-weight: 500;
  }
  .card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.1rem 1.25rem;
    margin-bottom: 1rem;

  .card-title { font-size: 15px; font-weight: 500; margin-bottom: .6rem; }
  .badge {
    display: inline-block; font-size: 11px; font-weight: 500;
    padding: 2px 8px; border-radius: 4px;
    margin-right: 6px; margin-bottom: 4px;
  }
  .b-teal { background: var(--color-background-success); color: var(--color-text-success); }
  .b-amber { background: var(--color-background-warning); color: var(--color-text-warning); }
  .b-red { background: var(--color-background-danger); color: var(--color-text-danger); }
  .b-info { background: var(--color-background-info); color: var(--color-text-info); }
  .b-gray { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  .b-purple { background: #EEEDFE; color: #3C3489; }

  .row2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 10px; }
  @media (max-width: 600px) {
    .row3 { grid-template-columns: 1fr; }
    .row2 { grid-template-columns: 1fr; }
  }
  .mini {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: .7rem .85rem;
  }
  .mini-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
  .mini-val { font-size: 13px; font-weight: 500; line-height: 1.5; }
  .algo {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: .8rem 1rem;
    font-size: 12.5px; line-height: 1.8;
    color: var(--color-text-secondary);
  }
  .algo b { color: var(--color-text-primary); font-weight: 500; }
  .step-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .step-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--color-background-info); color: var(--color-text-info);
    font-size: 11px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .psy {
    border-left: 2px solid var(--color-border-info);
    padding-left: .75rem; font-size: 12.5px;
    color: var(--color-text-secondary); line-height: 1.7;
    margin-bottom: .8rem;
  }
  .warn {
    border-left: 2px solid var(--color-border-danger);
    padding-left: .75rem; font-size: 12px;
    color: var(--color-text-danger); line-height: 1.7;
  }
  .section-label {
    font-size: 11px; font-weight: 500;
    color: var(--color-text-tertiary);
    text-transform: uppercase; letter-spacing: .05em;
    margin-bottom: .4rem;
  }
  hr { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: .8rem 0; }
  .page-title-area { margin-bottom: 1.5rem; }
</style>
</head>

<div class="top-nav" id="nav"></div>

function render(id) {
  const g = groups.find(x => x.id === id);
  document.getElementById('content').innerHTML =
    `<div><div style="font-size:16px;font-weight:500;margin-bottom:1rem">${g.title}</div>${g.content()}</div>`;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-id="${id}"]`).classList.add('active');
}

const nav = document.getElementById('nav');
groups.forEach(g => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.dataset.id = g.id;
  btn.textContent = g.label;
  btn.onclick = () => render(g.id);
  nav.appendChild(btn);
});
render('daily');
