<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>トレード記録</title>
</head>

<body>

<div class="section">

  <p class="note">この判断は以下ルールに基づいています</p>

  <a href="add/my_rule5.html" class="rule-link">
    ▶ 実トレード運用（方針・ルール）を見る
  </a>

</div>

<div class="section">

  <h2>トレード記録</h2>

  <ul class="record-list" id="tradeList">

    <li data-pips="0">
      <a href="weekly/20260331.html">
        <span class="date">2026/03/31</span>
        <span class="desc">初回検証（ノートレード）</span>
        <span class="result neutral">0p</span>
      </a>
    </li>

    <li data-pips="0">
      <a href="weekly/20260401.html">
        <span class="date">2026/04/01</span>
        <span class="desc">フロー不成立（見送り）</span>
        <span class="result neutral">0p</span>
      </a>
    </li>

    <li data-pips="12">
      <a href="weekly/20260402.html">
        <span class="date">2026/04/02</span>
        <span class="desc">フロー成立（順張り）</span>
        <span class="result good">+12p</span>
      </a>
    </li>

    <li data-pips="-8">
      <a href="weekly/20260403.html">
        <span class="date">2026/04/03</span>
        <span class="desc">追いかけエントリー</span>
        <span class="result bad">-8p</span>
      </a>
    </li>

  </ul>

</div>

<div class="section summary">

  <h2>月間集計</h2>

  <div class="summary-box">
    <p>合計：<span id="total"></span> pips</p>
    <p>勝率：<span id="winrate"></span> %</p>
    <p>平均：<span id="average"></span> pips</p>
  </div>

</div>

<script>
  const trades = document.querySelectorAll("#tradeList li");

  let total = 0;
  let win = 0;
  let count = 0;

  trades.forEach(trade => {
    const pips = parseFloat(trade.dataset.pips);

    total += pips;
    count++;

    if (pips > 0) win++;
  });

  const winrate = count ? (win / count * 100).toFixed(1) : 0;
  const average = count ? (total / count).toFixed(1) : 0;

  document.getElementById("total").textContent = total;
  document.getElementById("winrate").textContent = winrate;
  document.getElementById("average").textContent = average;
</script>

</body>
</html>
